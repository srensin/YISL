<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <title>Interstellar</title>
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
</head>

<body>
  <a-scene>

    <a-sky color="grey"></a-sky>
    <a-box position="-5 -0.5 -8" rotation="0 45 0" color="white"></a-box>
    <a-sphere position="0 0.25 -5" radius="1.25" color="white"></a-sphere>
    <a-cylinder position="1 -0.25 -3" radius="0.5" height="1.5" color="white"></a-cylinder>
    <a-plane position="0 -1 -4" rotation="-90 0 0" width="4" height="4" color="white"></a-plane>
    
    <a-image src="1.png" position="0 5 -10"
      width="25" height="10"></a-image>
    
    <a-text value="Interstellar" position="0 9.5 -10" align="center" color="white" font="mozillavr"
      width="10" height="5" anchor="center">
    </a-text>


  </a-scene>
</body>

</html>
